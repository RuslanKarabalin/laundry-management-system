---
- name: Install k3s
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | sh -
  args:
    creates: /usr/local/bin/k3s

- name: Wait for k3s to be ready
  ansible.builtin.command: kubectl get nodes
  register: k3s_nodes
  retries: 10
  delay: 5
  until: k3s_nodes.rc == 0
  changed_when: false

- name: Configure UFW - allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Configure UFW - allow Kubernetes API
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp

- name: Configure UFW - allow HTTP
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Configure UFW - allow HTTPS
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Create namespaces
  ansible.builtin.command: kubectl create namespace {{ item }}
  loop:
    - "{{ staging_namespace }}"
    - "{{ production_namespace }}"
  register: ns_result
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
  changed_when: ns_result.rc == 0

- name: Create GitLab registry secret
  ansible.builtin.command: >
    kubectl create secret docker-registry gitlab-registry
    --docker-server={{ gitlab_registry_server }}
    --docker-username={{ gitlab_registry_username }}
    --docker-password={{ gitlab_registry_token }}
    --namespace={{ item }}
  loop:
    - "{{ staging_namespace }}"
    - "{{ production_namespace }}"
  register: secret_result
  failed_when: secret_result.rc != 0 and 'already exists' not in secret_result.stderr
  changed_when: secret_result.rc == 0

- name: Render staging manifest
  ansible.builtin.template:
    src: k8s_deployment.yaml.j2
    dest: /tmp/{{ app_name }}-staging.yaml
    mode: "0644"
  vars:
    namespace: "{{ staging_namespace }}"
    replicas: "{{ staging_replicas }}"
    ingress_host: "{{ staging_ingress_host }}"

- name: Render production manifest
  ansible.builtin.template:
    src: k8s_deployment.yaml.j2
    dest: /tmp/{{ app_name }}-production.yaml
    mode: "0644"
  vars:
    namespace: "{{ production_namespace }}"
    replicas: "{{ production_replicas }}"
    ingress_host: "{{ production_ingress_host }}"

- name: Apply staging manifest
  ansible.builtin.command: kubectl apply -f /tmp/{{ app_name }}-staging.yaml

- name: Apply production manifest
  ansible.builtin.command: kubectl apply -f /tmp/{{ app_name }}-production.yaml
